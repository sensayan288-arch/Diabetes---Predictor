<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #2c3e50; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; font-size: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🩺 Diabetes Predictor</h1>
    <form action="/predict" method="post">
        <label>Pregnancies</label>
        <input type="number" name="pregnancies" placeholder="e.g. 2" required>

        <label>Glucose Level</label>
        <input type="number" name="glucose" placeholder="e.g. 120" required>

        <label>Blood Pressure</label>
        <input type="number" name="bloodpressure" placeholder="e.g. 70" required>

        <label>Skin Thickness</label>
        <input type="number" name="skinthickness" placeholder="e.g. 20" required>

        <label>Insulin</label>
        <input type="number" name="insulin" placeholder="e.g. 80" required>

        <label>BMI</label>
        <input type="number" step="0.1" name="bmi" placeholder="e.g. 28.5" required>

        <label>Diabetes Pedigree Function</label>
        <input type="number" step="0.001" name="dpf" placeholder="e.g. 0.5" required>

        <label>Age</label>
        <input type="number" name="age" placeholder="e.g. 25" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
    <div class="result" style="color: {{ color }};">
        Result: {{ prediction }}
    </div>
    {% endif %}
</body>
</html>
